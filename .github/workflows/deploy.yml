name: "Asay Technologies: S3 Static Deployment"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: "ap-south-2"
  S3_BUCKET: "asay-technologies-web-bucket"

jobs:
  build:
    name: "1: Build Project"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Frontend Dependencies
        run: npm install
      - name: Build Frontend (Verification)
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          VITE_TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          VITE_WEBSITE_WHATSAPP_NUMBER: ${{ secrets.WEBSITE_WHATSAPP_NUMBER }}
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  aws-infrastructure:
    name: "2: AWS Infrastructure"
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform Init
        run: terraform init
        working-directory: ./
      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve
        working-directory: ./

  s3-asset-sync:
    name: "3: S3 Asset Sync"
    needs: aws-infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/
      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete --region ${{ env.AWS_REGION }}

  connectivity-check:
    name: "4: Verification"
    needs: s3-asset-sync
    runs-on: ubuntu-latest
    steps:
      - name: Check Website URL
        run: |
          URL="http://${{ env.S3_BUCKET }}.s3-website.${{ env.AWS_REGION }}.amazonaws.com"
          echo "Checking website availability at $URL"
          curl -I $URL

      - name: WhatsApp Integration Test
        run: |
          echo "Sending test WhatsApp message via Twilio API..."
          RESPONSE=$(curl -s -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
            --data-urlencode "To=whatsapp:${{ secrets.WEBSITE_WHATSAPP_NUMBER }}" \
            --data-urlencode "From=whatsapp:+14155238886" \
            --data-urlencode "Body=🚀 Asay Technologies Deployment Update: Static site is live and WhatsApp integration is verified!" \
            -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}")
          
          if echo "$RESPONSE" | grep -q '"status": "queued"'; then
            echo "✅ WhatsApp test message sent successfully."
          else
            echo "❌ Failed to send WhatsApp message. Check your Twilio credentials."
            echo "Response: $RESPONSE"
          fi