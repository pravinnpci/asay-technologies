name: "Asay Technologies: 7-Stage CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: "ap-south-2"
  DOCKER_IMAGE: pravinnpci/asay-tech
  EXISTING_EIP: "18.60.246.115"
  S3_BUCKET: "asay-technologies-web-bucket"
  STATE_BUCKET: "siva-medicals-tfstate-pravin"

jobs:
  build-and-test:
    name: "1: Backend Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Frontend Dependencies
        run: npm install
      - name: Build Frontend (Verification)
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  docker-ci:
    name: "2: Build & Push Image"
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  aws-infrastructure:
    name: "3: AWS Infrastructure"
    needs: docker-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=asay-tech/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
        working-directory: ./terraform_aws
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform_aws

  s3-asset-sync:
    name: "4: S3 Static Asset Sync"
    needs: aws-infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Sync to S3
        run: |
          npm install
          npm run build
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete --region ${{ env.AWS_REGION }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  k3s-setup:
    name: "5: K3s Cluster Setup"
    needs: s3-asset-sync
    runs-on: ubuntu-latest
    steps:
      - name: Setup K3s on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EXISTING_EIP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v k3s >/dev/null 2>&1; then
              curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode 644" sh -
            fi

  kubernetes-app-run:
    name: "6: K8s App Deployment"
    needs: k3s-setup
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Manifests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EXISTING_EIP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl apply -f - <<EOF
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: asay-tech
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: asay-tech
              template:
                metadata:
                  labels:
                    app: asay-tech
                spec:
                  containers:
                  - name: asay-tech
                    image: ${{ env.DOCKER_IMAGE }}:latest
                    ports:
                    - containerPort: 3000
            EOF
            kubectl rollout restart deployment/asay-tech

  connectivity-check:
    name: "7: Full Stack Connectivity Check"
    needs: kubernetes-app-run
    runs-on: ubuntu-latest
    steps:
      - name: Verify App and WhatsApp Integration
        run: |
          echo "Checking site availability at http://${{ env.EXISTING_EIP }}"
          curl --retry 5 --retry-delay 5 -I http://${{ env.EXISTING_EIP }} || echo "App might be starting up..."
          echo "WhatsApp message test from contact form: Verifying Twilio credentials..."
          if [ -z "${{ secrets.TWILIO_ACCOUNT_SID }}" ]; then echo "Error: TWILIO_ACCOUNT_SID missing"; exit 1; fi
          echo "✅ WhatsApp configuration verified."