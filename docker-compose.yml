services:
  asay-tech:
    build:
      context: .
      args:
        VITE_TWILIO_ACCOUNT_SID: ${VITE_TWILIO_ACCOUNT_SID}
        VITE_TWILIO_AUTH_TOKEN: ${VITE_TWILIO_AUTH_TOKEN}
        VITE_TWILIO_CONTENT_SID: ${VITE_TWILIO_CONTENT_SID}
        VITE_WEBSITE_WHATSAPP_NUMBER: ${VITE_WEBSITE_WHATSAPP_NUMBER}
        VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY}
    ports:
      - "3000:80"
    restart: always
    env_file:
      - .env