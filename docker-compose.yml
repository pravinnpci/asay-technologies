services:
  asay-tech:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
      - VITE_TWILIO_ACCOUNT_SID=${VITE_TWILIO_ACCOUNT_SID}
      - VITE_TWILIO_AUTH_TOKEN=${VITE_TWILIO_AUTH_TOKEN}
      - VITE_TWILIO_CONTENT_SID=${VITE_TWILIO_CONTENT_SID}
    stdin_open: true
    tty: true
